<script>
const D=["Kjøttkaker med potet - En norsk variant av kjøttkake med poteter i stikkeform.", "Kjøtt og grönsaker i ugn - En enkel rett med kjøtt og diverse grønnsaker bakt i ugn.", "Laks med avocado og løk - En nordisk variant av laks med avocado og løk som tilsetning.", "Grønnsakssuppe med svartpepper - En enkel grønnsakssuppe med kraftig smak av svartpepper.", "Pannkaker med nøtter - Pannkaker med nøtter og frukt som enkelt tilrettelagt dessert.", "Pølsegrill med ost - En enkel middag med pølsegrill og ost til tilskudd.", "Kjøttboller med tomat - En norsk variant av kjøttboller laget med tomat som tilskudd.", "Røstet grønnsaks salat - En enkel røstet grønnsaks salat til sommeren.", "Laks med grønnsaker - En enkel laks med grønnsaker som tilskudd.", "Potet og kjøttstuing - En norsk variant av potet og kjøttstuing.", "Kjøtt med røstet potet - En enkel kjøtt med røstet potet som hovedretten.", "Grønnsakssalat med feta - En enkel grønnsakssalat med feta som tilskudd.", "Pannkaker med frukt - En enkel pannkaker med frukt som dessert.", "Kjøtt med sild - En enkel kjøtt med sild til tilskudd.", "Røstet svamp - En enkel røstet svamp som tilskudd til hovedretten.", "Pølse med grønnsaker - En enkel pølse med grønnsaker som tilskudd.", "Laks med løk - En enkel laks med løk som tilskudd.", "Kjøttkake med poteter - En norsk variant av kjøttkake med poteter i stikkeform.", "Kjøtt med grønnsaker - En enkel kjøtt med grønnsaker som hovedretten.", "Potet og løk - En enkel potet og løk som tilskudd.", "Pølse med ost - En enkel pølse med ost som tilskudd.", "Grønnsaksalat med korn - En enkel grønnsaksalat med korn som tilskudd.", "Kjøtt med syltede grønnsaker - En enkel"];
const H=[];
function gen(){
  const r=D[Math.floor(Math.random()*D.length)];
  document.getElementById('result').innerText=r;
  H.unshift(r);if(H.length>6)H.pop();
  document.getElementById('hist').innerHTML=
    H.map(function(h){
      return '<span class="h-tag" onclick="document.getElementById('result').innerText=this.innerText">'+h+'</span>';
    }).join('');
}
function cp(){
  const t=document.getElementById('result').innerText;
  navigator.clipboard.writeText(t).catch(function(){});
  const b=document.querySelector('.btn.cp');
  const o=b.textContent;b.textContent='✅ Copié!';
  setTimeout(function(){b.textContent=o;},2000);
}
gen();
</script>
