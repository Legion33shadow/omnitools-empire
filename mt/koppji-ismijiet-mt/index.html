<style>
:root{--p:#1a1a2e;--a:#e94560;--bg:#f8f9fa;--card:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 12px}
.ad-w{width:100%;max-width:640px;margin:10px 0;min-height:90px}

.desc{color:#666;margin-bottom:20px;font-size:.93rem}
#result{font-size:2rem;font-weight:700;color:var(--a);min-height:54px;
         padding:14px 0;transition:.25s;word-break:break-word;line-height:1.4}
.btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:4px 0}
.btn{background:var(--p);color:#fff;border:none;padding:13px 30px;font-size:.97rem;
      border-radius:50px;cursor:pointer;transition:.2s;flex:1;min-width:130px;max-width:200px}
.btn:hover{background:var(--a);transform:scale(1.03)}

.aff a{color:var(--a);text-decoration:none;font-weight:600}

<body>

<div class="card">

<script>
const D=["Ihhuqa tal-Maltin", "Ħabib tal-Maltin", "Senti ta' Malti", "Malti ta' Kultura", "Ħbieb ta' Malti", "Ħabib tal-Kultura", "Malti tal-Imħabba", "Ħbieb li Jigu", "Iħobb Malti", "Koppja Maltija", "Malta Maltija", "Ħbieb Maltin", "Malti ta' Ħbieb", "Kultura Maltija", "Ħbieb li Jafu", "Ħbieb tal-Malti", "Iħobb il-Kultura", "Malti tal-Ħabib", "Ta' Malti li Jaf", "Ħabib li Jigbru", "Malti li Jigu", "Ħbieb Maltin li Jafu", "Iħobb Malti li Jaf", "Ħabib li Jaf Malti", "Ħbieb Maltin li Jigu", "Ħbieb li Jigbru Malti", "Malti li Jigu Maltija", "Ħabib tal-Malti li Jaf", "Ħbieb li Jafu Malti", "Malti li Jigu Ħbieb", "Ħabib li Jafu Ħbieb", "Ħbieb li Jigbru Ħbieb", "Ħabib li Jafu Maltin", "Iħobb il-Kultura ta' Malti"];
const H=[];
function gen(){
  const r=D[Math.floor(Math.random()*D.length)];
  document.getElementById('result').innerText=r;
  H.unshift(r);if(H.length>6)H.pop();
  document.getElementById('hist').innerHTML=
    H.map(function(h){
      return '<span class="h-tag" onclick="document.getElementById('result').innerText=this.innerText">'+h+'</span>';
    }).join('');
}
function cp(){
  const t=document.getElementById('result').innerText;
  navigator.clipboard.writeText(t).catch(function(){});
  const b=document.querySelector('.btn.cp');
  const o=b.textContent;b.textContent='✅ Copié!';
  setTimeout(function(){b.textContent=o;},2000);
}
gen();
</script>
