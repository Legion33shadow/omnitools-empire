<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mortgage Calculator Pro</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5382997898313669" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f2027;color:#e0e0e0;min-height:100vh}
  .header{background:linear-gradient(135deg,#203a43,#2c5364);padding:24px;text-align:center;color:#fff}
  .header h1{font-size:1.8rem} .header p{opacity:.8;font-size:.95rem;margin-top:4px}
  .ad{background:#1a2a35;border:1px dashed #2c5364;border-radius:8px;padding:16px;margin:16px auto;max-width:900px;text-align:center;color:#667}
  .app{max-width:780px;margin:24px auto;background:#1a2a35;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
  label{display:block;margin-bottom:6px;color:#8899aa;font-size:.9rem}
  input,select{width:100%;padding:12px;background:#0f2027;border:1px solid #2c5364;border-radius:8px;color:#fff;font-size:1rem;margin-bottom:16px}
  button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:.2s}
  button:hover{opacity:.9} .result{background:#0f2027;border-radius:12px;padding:24px;margin-top:20px;text-align:center}
  .result .val{font-size:2.2rem;font-weight:700;color:#667eea} .result .lbl{color:#8899aa;font-size:.9rem}
  table{width:100%;border-collapse:collapse;margin-top:16px;font-size:.85rem}
  th{background:#203a43;color:#fff;padding:8px} td{padding:8px;border-bottom:1px solid #1a2a35;text-align:right}
  tr:hover td{background:#203a43} footer{text-align:center;padding:20px;color:#445;font-size:.8rem}
</style>
</head>
<body>
<div class="header"><h1>Mortgage Calculator Pro</h1><p>Free professional calculator — Updated 2025</p></div>
<div class="ad">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5382997898313669" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<div class="app">
  <h2 style="margin-bottom:20px;color:#667eea">Mortgage Calculator</h2>
  <label>Home Price ($)</label><input id="price" type="number" value="350000">
  <label>Down Payment ($)</label><input id="down" type="number" value="70000">
  <label>Annual Interest Rate (%)</label><input id="mrate" type="number" value="6.5" step="0.1">
  <label>Loan Term (years)</label>
  <select id="years">
    <option value="30" selected>30 years</option>
    <option value="20">20 years</option>
    <option value="15">15 years</option>
    <option value="10">10 years</option>
  </select>
  <label>Annual Property Tax ($)</label><input id="tax" type="number" value="4200">
  <label>Annual Home Insurance ($)</label><input id="ins" type="number" value="1500">
  <button onclick="calcMortgage()">Calculate Mortgage</button>
  <div id="mort-res"></div>
</div>
<script>
function calcMortgage(){
  const P=parseFloat(document.getElementById('price').value)||0;
  const dp=parseFloat(document.getElementById('down').value)||0;
  const r=parseFloat(document.getElementById('mrate').value)/100/12;
  const n=parseInt(document.getElementById('years').value)*12;
  const tax=parseFloat(document.getElementById('tax').value)||0;
  const ins=parseFloat(document.getElementById('ins').value)||0;
  const loan=P-dp;
  if(loan<=0||r<=0||n<=0){document.getElementById('mort-res').innerHTML='<p style="color:#f66">Check values</p>';return;}
  const pi=loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
  const total_monthly=pi+tax/12+ins/12;
  const f=v=>v.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0});
  document.getElementById('mort-res').innerHTML=`
    <div class="result">
      <div class="val">${f(total_monthly)}/mo</div><div class="lbl">Total Monthly Payment</div>
      <div style="display:flex;gap:20px;margin-top:16px;justify-content:center;flex-wrap:wrap">
        <div><div style="font-size:1.1rem;color:#667eea">${f(pi)}</div><div class="lbl">Principal & Interest</div></div>
        <div><div style="font-size:1.1rem;color:#4ecdc4">${f(tax/12)}</div><div class="lbl">Property Tax/mo</div></div>
        <div><div style="font-size:1.1rem;color:#ffd93d">${f(ins/12)}</div><div class="lbl">Insurance/mo</div></div>
        <div><div style="font-size:1.1rem;color:#ff6b6b">${f(loan)}</div><div class="lbl">Loan Amount</div></div>
        <div><div style="font-size:1.1rem;color:#ff6b6b">${f(pi*n-loan)}</div><div class="lbl">Total Interest</div></div>
      </div>
    </div>`;
}
</script>
<div class="ad">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5382997898313669" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<footer>© 2025 | <a href="/sitemap.xml" style="color:#667eea">Sitemap</a></footer>
</body></html>
