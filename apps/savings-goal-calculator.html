<div class="app"><div class="card"><h2>🎯 Savings Goal Calculator</h2><p style='color:#8892b0;margin-bottom:16px'>Calculate how much to save monthly to reach your goal</p><label>Savings Goal ($)</label><input id='sg_goal' type='number' value='20000'><label>Already Saved ($)</label><input id='sg_saved' type='number' value='2000'><label>Expected Annual Interest Rate (%)</label><input id='sg_rate' type='number' value='4' step='0.1'><label>Time to Reach Goal (months)</label><input id='sg_months' type='number' value='24'><button onclick='calcSavings()'>🎯 Calculate Monthly Savings</button><div id='sg_res'></div><script>function calcSavings(){
  const goal=+document.getElementById('sg_goal').value||0;
  const saved=+document.getElementById('sg_saved').value||0;
  const rate=+document.getElementById('sg_rate').value/100/12;
  const months=+document.getElementById('sg_months').value||12;
  const need=goal-saved;
  let monthly;
  if(rate===0){
    monthly=need/months;
  }else{
    monthly=need*rate/(Math.pow(1+rate,months)-1);
  }
  const total=monthly*months;
  const interest=total-(need>0?need:0);
  const f=v=>'$'+Math.abs(v).toFixed(2);
  const today=new Date();
  today.setMonth(today.getMonth()+months);
  const goalDate=today.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('sg_res').innerHTML=`
    <div class='result'>
      <div class='big'>${f(monthly)}/mo</div>
      <div class='lbl'>Required Monthly Savings — Goal: ${goalDate}</div>
      <div class='g2'>
        <div class='stat'><div class='v' style='color:#7c8cff'>${f(goal)}</div><div class='l'>Savings Goal</div></div>
        <div class='stat'><div class='v' style='color:#4ade80'>${f(saved)}</div><div class='l'>Already Saved</div></div>
        <div class='stat'><div class='v' style='color:#f87171'>${f(need>0?need:0)}</div><div class='l'>Still Needed</div></div>
        <div class='stat'><div class='v' style='color:#fbbf24'>${f(interest)}</div><div class='l'>Interest Earned</div></div>
      </div>
    </div>`;}
</script></div></div>
