<div class="app"><div class="card"><h2 style='color:#7c8cff;margin-bottom:20px'>📐 Universal Unit Converter</h2><label>Category</label><select id='ucat' onchange='updateUnits()'><option value='length'>Length</option><option value='weight'>Weight</option><option value='area'>Area</option><option value='volume'>Volume</option><option value='speed'>Speed</option><option value='data'>Data</option></select><label>Value</label><input id='uval' type='number' value='1' oninput='convertUnit()'><div style='display:grid;grid-template-columns:1fr 1fr;gap:10px'><div><label>From</label><select id='ufrom' onchange='convertUnit()'></select></div><div><label>To</label><select id='uto' onchange='convertUnit()'></select></div></div><div id='ures' style='margin-top:16px'></div><script>const UNITS={
  length:{meter:1,kilometer:0.001,centimeter:100,millimeter:1000,mile:0.000621371,yard:1.09361,foot:3.28084,inch:39.3701},
  weight:{kilogram:1,gram:1000,pound:2.20462,ounce:35.274,ton:0.001,stone:0.157473},
  area:{sqmeter:1,sqkilometer:1e-6,sqfoot:10.7639,sqyard:1.19599,acre:0.000247105,hectare:0.0001},
  volume:{liter:1,milliliter:1000,gallon:0.264172,quart:1.05669,pint:2.11338,cup:4.22675},
  speed:{'m/s':1,'km/h':3.6,mph:2.23694,knot:1.94384},
  data:{byte:1,kilobyte:0.0009765625,megabyte:9.537e-7,gigabyte:9.313e-10,terabyte:9.095e-13,bit:8}
};
function updateUnits(){
  const cat=document.getElementById('ucat').value;
  const keys=Object.keys(UNITS[cat]);
  ['ufrom','uto'].forEach((id,i)=>{
    document.getElementById(id).innerHTML=keys.map((k,j)=>`<option value='${k}' ${j==i?'selected':''}>${k}</option>`).join('');
  });
  convertUnit();
}
function convertUnit(){
  const cat=document.getElementById('ucat').value;
  const val=+document.getElementById('uval').value||0;
  const from=document.getElementById('ufrom').value;
  const to=document.getElementById('uto').value;
  const f=UNITS[cat][from];const t=UNITS[cat][to];
  const result=(val/f)*t;
  const fmt=result>0.001&&result<1e9?+result.toFixed(8):result.toExponential(4);
  document.getElementById('ures').innerHTML=`
    <div class='result'><div class='big'>${fmt}</div>
    <div class='lbl'>${val} ${from} = ${fmt} ${to}</div></div>`;}
updateUnits();
</script></div></div>
