<div class="app"><div class="card"><h2 style='color:#7c8cff;margin-bottom:20px'>₿ Crypto Portfolio Tracker (Live)</h2><p style='color:#8892b0;margin-bottom:16px'>Live prices from CoinGecko API</p><div id='prowrap'><div class='prow' style='display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px'><select class='csel' style='padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><option value='bitcoin'>Bitcoin (BTC)</option><option value='ethereum'>Ethereum (ETH)</option><option value='solana'>Solana (SOL)</option><option value='cardano'>Cardano (ADA)</option><option value='chainlink'>Chainlink (LINK)</option></select><input type='number' class='qin' placeholder='Qty' value='0.5' style='padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><input type='number' class='bin' placeholder='Buy $' value='40000' style='padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><button onclick='this.parentElement.remove()' style='width:40px;padding:10px;background:#f87171;border-radius:8px;border:none;color:#fff;cursor:pointer'>×</button></div></div><button onclick='addRow()' style='background:#1a1f3a;border:1px dashed #3d4580;color:#7c8cff;margin-bottom:12px'>+ Add Coin</button><button onclick='trackPortfolio()'>📊 Track Live Portfolio</button><div id='pres'></div><script>async function trackPortfolio(){
  document.getElementById('pres').innerHTML='<p style=color:#7c8cff;text-align:center>⏳ Fetching live prices...</p>';
  const rows=document.querySelectorAll('.prow');
  const coins=[...new Set([...rows].map(r=>r.querySelector('.csel').value))];
  try{
    const resp=await fetch('https://api.coingecko.com/api/v3/simple/price?ids='+coins.join(',')+'&vs_currencies=usd&include_24hr_change=true');
    const prices=await resp.json();
    let tv=0,ti=0,tbl='';
    rows.forEach(row=>{
      const c=row.querySelector('.csel').value;
      const q=+row.querySelector('.qin').value||0;
      const b=+row.querySelector('.bin').value||0;
      const cur=prices[c]?.usd||0;
      const ch=prices[c]?.usd_24h_change||0;
      const v=q*cur;const inv=q*b;const pl=v-inv;
      tv+=v;ti+=inv;
      const c2=pl>=0?'#4ade80':'#f87171';
      tbl+=`<tr><td>${c}</td><td>${q}</td><td>$${cur.toLocaleString()}</td>`
           +`<td style=color:${ch>=0?'#4ade80':'#f87171'}>${ch.toFixed(2)}%</td>`
           +`<td>$${v.toFixed(2)}</td><td style=color:${c2}>${pl>=0?'+':''}$${pl.toFixed(2)}</td></tr>`;
    });
    const tpl=tv-ti;
    document.getElementById('pres').innerHTML=`
      <div class='result'><div class='big' style='color:${tpl>=0?'#4ade80':'#f87171'}'>$${tv.toFixed(2)}</div>
      <div class='lbl'>Total Portfolio Value</div>
      <div class='g2'>
        <div class='stat'><div class='v' style='color:${tpl>=0?'#4ade80':'#f87171'}'>${tpl>=0?'+':''}$${tpl.toFixed(2)}</div><div class='l'>P&L</div></div>
        <div class='stat'><div class='v'>${ti>0?((tpl/ti)*100).toFixed(1):0}%</div><div class='l'>ROI</div></div>
      </div></div>
      <table style=margin-top:16px><tr><th>Coin</th><th>Qty</th><th>Price</th><th>24h</th><th>Value</th><th>P&L</th></tr>${tbl}</table>`;
  }catch(e){document.getElementById('pres').innerHTML='<p style=color:#f87171>Error. Try again.</p>';}
}
function addRow(){
  const d=document.createElement('div');
  d.className='prow';
  d.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px';
  d.innerHTML=`<select class='csel' style='padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><option value=bitcoin>Bitcoin</option><option value=ethereum>Ethereum</option><option value=solana>Solana</option><option value=cardano>Cardano</option><option value=chainlink>Chainlink</option></select><input type=number class=qin placeholder=Qty value=1 style='padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><input type=number class=bin placeholder='Buy $' value=0 style='padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><button onclick=this.parentElement.remove() style='width:40px;padding:10px;background:#f87171;border-radius:8px;border:none;color:#fff;cursor:pointer'>×</button>`;
  document.getElementById('prowrap').appendChild(d);
}
