<div class="app"><div class="card"><h2 style='color:#7c8cff;margin-bottom:20px'>📅 Age &amp; Date Calculator</h2><label>Date of Birth</label><input id='dob' type='date' value='1990-01-01'><label>Calculate Age at</label><input id='refdate' type='date'><button onclick='calcAge()'>Calculate Age</button><div id='ageres'></div><script>document.getElementById('refdate').value=new Date().toISOString().split('T')[0];
function calcAge(){
  const dob=new Date(document.getElementById('dob').value);
  const ref=new Date(document.getElementById('refdate').value);
  if(isNaN(dob)||isNaN(ref)){document.getElementById('ageres').innerHTML='<p style=color:#f87171>Enter valid dates</p>';return;}
  const diff=ref-dob;
  const days=Math.floor(diff/86400000);
  const weeks=Math.floor(days/7);
  const months=Math.floor(days/30.44);
  const years=Math.floor(days/365.25);
  const nb=new Date(ref.getFullYear(),dob.getMonth(),dob.getDate());
  if(nb<ref)nb.setFullYear(nb.getFullYear()+1);
  const dtn=Math.ceil((nb-ref)/86400000);
  document.getElementById('ageres').innerHTML=`
    <div class='result'><div class='big'>${years}</div><div class='lbl'>Years Old</div>
    <div class='g2'>
      <div class='stat'><div class='v' style='color:#4ade80'>${months.toLocaleString()}</div><div class='l'>Months</div></div>
      <div class='stat'><div class='v' style='color:#7c8cff'>${weeks.toLocaleString()}</div><div class='l'>Weeks</div></div>
      <div class='stat'><div class='v' style='color:#a855f7'>${days.toLocaleString()}</div><div class='l'>Days</div></div>
      <div class='stat'><div class='v' style='color:#fbbf24'>${dtn}</div><div class='l'>Days to Birthday</div></div>
    </div></div>`;}
</script></div></div>
