<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Loan Calculator Pro</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5382997898313669" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f2027;color:#e0e0e0;min-height:100vh}
  .header{background:linear-gradient(135deg,#203a43,#2c5364);padding:24px;text-align:center;color:#fff}
  .header h1{font-size:1.8rem} .header p{opacity:.8;font-size:.95rem;margin-top:4px}
  .ad{background:#1a2a35;border:1px dashed #2c5364;border-radius:8px;padding:16px;margin:16px auto;max-width:900px;text-align:center;color:#667}
  .app{max-width:780px;margin:24px auto;background:#1a2a35;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
  label{display:block;margin-bottom:6px;color:#8899aa;font-size:.9rem}
  input,select{width:100%;padding:12px;background:#0f2027;border:1px solid #2c5364;border-radius:8px;color:#fff;font-size:1rem;margin-bottom:16px}
  button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:.2s}
  button:hover{opacity:.9} .result{background:#0f2027;border-radius:12px;padding:24px;margin-top:20px;text-align:center}
  .result .val{font-size:2.2rem;font-weight:700;color:#667eea} .result .lbl{color:#8899aa;font-size:.9rem}
  table{width:100%;border-collapse:collapse;margin-top:16px;font-size:.85rem}
  th{background:#203a43;color:#fff;padding:8px} td{padding:8px;border-bottom:1px solid #1a2a35;text-align:right}
  tr:hover td{background:#203a43} footer{text-align:center;padding:20px;color:#445;font-size:.8rem}
</style>
</head>
<body>
<div class="header"><h1>Loan Calculator Pro</h1><p>Free professional calculator — Updated 2025</p></div>
<div class="ad">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5382997898313669" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<div class="app">
  <h2 style="margin-bottom:20px;color:#667eea">Loan Calculator Pro</h2>
  <label>Loan Amount ($)</label><input id="amt" type="number" value="10000" min="1">
  <label>Annual Interest Rate (%)</label><input id="rate" type="number" value="5.5" step="0.1" min="0.1">
  <label>Loan Term (years)</label><input id="term" type="number" value="5" min="1" max="30">
  <button onclick="calc()">Calculate</button>
  <div id="res"></div>
</div>
<script>
function fmt(v){return v.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2})}
function calc(){
  const P=parseFloat(document.getElementById('amt').value)||0;
  const r=parseFloat(document.getElementById('rate').value)/100/12||0;
  const n=parseInt(document.getElementById('term').value)*12||1;
  if(P<=0||r<=0){document.getElementById('res').innerHTML='<p style="color:#f66">Enter valid values</p>';return}
  const emi=P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
  const total=emi*n; const interest=total-P;
  let rows=''; let bal=P;
  const show=Math.min(n,60);
  for(let i=1;i<=show;i++){
    const ip=bal*r; const pp=emi-ip; bal-=pp;
    rows+=`<tr><td>${i}</td><td>${fmt(emi)}</td><td>${fmt(pp)}</td><td>${fmt(ip)}</td><td>${fmt(Math.max(0,bal))}</td></tr>`;
  }
  if(n>60) rows+=`<tr><td colspan="5" style="text-align:center;color:#888">... ${n-60} more months</td></tr>`;
  document.getElementById('res').innerHTML=`
    <div class="result">
      <div class="val">${fmt(emi)}</div><div class="lbl">Monthly Payment</div>
      <div style="display:flex;gap:20px;margin-top:16px;justify-content:center;flex-wrap:wrap">
        <div><div style="font-size:1.3rem;color:#4ecdc4">${fmt(total)}</div><div class="lbl">Total Payment</div></div>
        <div><div style="font-size:1.3rem;color:#ff6b6b">${fmt(interest)}</div><div class="lbl">Total Interest</div></div>
      </div>
    </div>
    <table><thead><tr><th>Month</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}
</script>

  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
