<div class="section"><div class="card"><h3>💸 Debt Payoff Calculator</h3><label>Dette totale (€)</label><input id='debt' type='number' value='25000'><label>Taux d'intérêt moyen (%)</label><input id='intr' type='number' value='8' step='0.1'><label>Paiement mensuel (€)</label><input id='pay' type='number' value='650'><button onclick='calcDebt()'>Calculer les 2 stratégies</button><div id='debtres'></div><script>function calcDebt(){let d=parseFloat(document.getElementById('debt').value),r=parseFloat(document.getElementById('intr').value)/1200,p=parseFloat(document.getElementById('pay').value);let months=Math.ceil(Math.log(p/(p-d*r))/Math.log(1+r));document.getElementById('debtres').innerHTML=`<div style='padding:15px;background:#1e2937;border-radius:12px'><b>Snowball:</b> ${months} mois<br><b>Intérêts payés:</b> €${Math.round(months*p-d)}</div>`}</script></div></div>
