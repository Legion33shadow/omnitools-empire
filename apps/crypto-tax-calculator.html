<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Crypto Tax Calculator 2025</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5382997898313669" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f2027;color:#e0e0e0;min-height:100vh}
  .header{background:linear-gradient(135deg,#203a43,#2c5364);padding:24px;text-align:center;color:#fff}
  .header h1{font-size:1.8rem} .header p{opacity:.8;font-size:.95rem;margin-top:4px}
  .ad{background:#1a2a35;border:1px dashed #2c5364;border-radius:8px;padding:16px;margin:16px auto;max-width:900px;text-align:center;color:#667}
  .app{max-width:780px;margin:24px auto;background:#1a2a35;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
  label{display:block;margin-bottom:6px;color:#8899aa;font-size:.9rem}
  input,select{width:100%;padding:12px;background:#0f2027;border:1px solid #2c5364;border-radius:8px;color:#fff;font-size:1rem;margin-bottom:16px}
  button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:.2s}
  button:hover{opacity:.9} .result{background:#0f2027;border-radius:12px;padding:24px;margin-top:20px;text-align:center}
  .result .val{font-size:2.2rem;font-weight:700;color:#667eea} .result .lbl{color:#8899aa;font-size:.9rem}
  table{width:100%;border-collapse:collapse;margin-top:16px;font-size:.85rem}
  th{background:#203a43;color:#fff;padding:8px} td{padding:8px;border-bottom:1px solid #1a2a35;text-align:right}
  tr:hover td{background:#203a43} footer{text-align:center;padding:20px;color:#445;font-size:.8rem}
</style>
</head>
<body>
<div class="header"><h1>Crypto Tax Calculator 2025</h1><p>Free professional calculator — Updated 2025</p></div>
<div class="ad">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5382997898313669" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<div class="app">
  <h2 style="margin-bottom:20px;color:#667eea">Crypto Tax Calculator</h2>
  <label>Buy Price (per coin $)</label><input id="buy" type="number" value="30000">
  <label>Sell Price (per coin $)</label><input id="sell" type="number" value="45000">
  <label>Quantity (coins)</label><input id="qty" type="number" value="1" step="0.001">
  <label>Holding Period</label>
  <select id="held">
    <option value="short">Short-term (under 1 year)</option>
    <option value="long">Long-term (over 1 year)</option>
  </select>
  <label>Country</label>
  <select id="country">
    <option value="US">🇺🇸 United States</option>
    <option value="UK">🇬🇧 United Kingdom</option>
    <option value="DE">🇩🇪 Germany</option>
    <option value="FR">🇫🇷 France</option>
    <option value="CA">🇨🇦 Canada</option>
  </select>
  <button onclick="calcTax()">Calculate Tax</button>
  <div id="tax-res"></div>
</div>
<script>
function calcTax(){
  const buy=parseFloat(document.getElementById('buy').value)||0;
  const sell=parseFloat(document.getElementById('sell').value)||0;
  const qty=parseFloat(document.getElementById('qty').value)||1;
  const held=document.getElementById('held').value;
  const country=document.getElementById('country').value;
  const gain=(sell-buy)*qty;
  const rates={US:{short:37,long:20},UK:{short:20,long:10},DE:{short:25,long:0},FR:{short:30,long:30},CA:{short:33,long:16.5}};
  const r=rates[country]||rates['US'];
  const rate=held==='short'?r.short:r.long;
  const tax=gain>0?gain*rate/100:0;
  const net=gain-tax;
  document.getElementById('tax-res').innerHTML=`
    <div class="result">
      <div class="val" style="color:${gain>=0?'#4ecdc4':'#ff6b6b'}">${gain>=0?'+':''}$${gain.toFixed(2)}</div>
      <div class="lbl">Capital Gain/Loss</div>
      <div style="display:flex;gap:20px;margin-top:16px;justify-content:center;flex-wrap:wrap">
        <div><div style="font-size:1.3rem;color:#ff6b6b">$${tax.toFixed(2)}</div><div class="lbl">Estimated Tax (${rate}%)</div></div>
        <div><div style="font-size:1.3rem;color:#4ecdc4">$${net.toFixed(2)}</div><div class="lbl">Net After Tax</div></div>
      </div>
    </div>`;
}
</script>

  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
