<div class="app"><div class="card"><h2 style='color:#7c8cff;margin-bottom:20px'>⚖️ BMI & Health Calculator</h2><label>Unit</label><select id='bu' onchange='toggleUnit()'><option value='metric'>Metric (kg/cm)</option><option value='imperial'>Imperial (lbs/in)</option></select><div id='bm'><label>Weight (kg)</label><input id='bwkg' type='number' value='70'><label>Height (cm)</label><input id='bhcm' type='number' value='175'></div><div id='bi' style='display:none'><label>Weight (lbs)</label><input id='bwlb' type='number' value='154'><label>Height (in)</label><input id='bhin' type='number' value='69'></div><label>Age</label><input id='bage' type='number' value='30'><label>Gender</label><select id='bgender'><option value='m'>Male</option><option value='f'>Female</option></select><button onclick='calcBMI()'>Calculate</button><div id='bres'></div><script>function toggleUnit(){
  const u=document.getElementById('bu').value;
  document.getElementById('bm').style.display=u==='metric'?'block':'none';
  document.getElementById('bi').style.display=u==='imperial'?'block':'none';
}
function calcBMI(){
  const u=document.getElementById('bu').value;
  let w,h;
  if(u==='metric'){w=+document.getElementById('bwkg').value;h=+document.getElementById('bhcm').value/100;}
  else{w=+document.getElementById('bwlb').value*0.453592;h=+document.getElementById('bhin').value*0.0254;}
  const age=+document.getElementById('bage').value;
  const g=document.getElementById('bgender').value;
  const bmi=w/(h*h);
  const bmr=g==='m'?(10*w+6.25*h*100-5*age+5):(10*w+6.25*h*100-5*age-161);
  let cat,color;
  if(bmi<18.5){cat='Underweight';color='#60a5fa';}
  else if(bmi<25){cat='Normal';color='#4ade80';}
  else if(bmi<30){cat='Overweight';color='#fbbf24';}
  else{cat='Obese';color='#f87171';}
  const iL=(18.5*h*h).toFixed(1),iH=(24.9*h*h).toFixed(1);
  document.getElementById('bres').innerHTML=`
    <div class='result'><div class='big' style='color:${color}'>${bmi.toFixed(1)}</div>
    <div class='lbl'>BMI — <b style='color:${color}'>${cat}</b></div>
    <div class='g2'>
      <div class='stat'><div class='v'>${bmr.toFixed(0)} kcal</div><div class='l'>BMR</div></div>
      <div class='stat'><div class='v'>${(bmr*1.55).toFixed(0)} kcal</div><div class='l'>TDEE active</div></div>
      <div class='stat'><div class='v'>${iL}–${iH} kg</div><div class='l'>Ideal Weight</div></div>
      <div class='stat'><div class='v'>${((w-iL*1)>0?'+':'')}${(w-iL*1).toFixed(1)} kg</div><div class='l'>vs Ideal</div></div>
    </div></div>`;}
</script></div></div>
