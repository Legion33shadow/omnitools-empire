<div class="app"><div class="card"><h2>📊 Inflation Calculator</h2><p style='color:#8892b0;margin-bottom:16px'>Calculate the real purchasing power of money over time</p><label>Amount ($)</label><input id='inf_amt' type='number' value='10000'><label>From Year</label><input id='inf_from' type='number' value='2000' min='1900' max='2100'><label>To Year</label><input id='inf_to' type='number' value='2025' min='1900' max='2100'><label>Annual Inflation Rate (%)</label><select id='inf_rate'><option value='2'>2% (Target rate)</option><option value='3' selected>3% (Historical US avg)</option><option value='4'>4% (Elevated)</option><option value='6'>6% (High inflation)</option><option value='8'>8% (Very high)</option><option value='10'>10% (Hyperinflation)</option></select><button onclick='calcInflation()'>Calculate Inflation Impact</button><div id='inf_res'></div><script>function calcInflation(){
  const amount=+document.getElementById('inf_amt').value||0;
  const fromY=+document.getElementById('inf_from').value||2000;
  const toY=+document.getElementById('inf_to').value||2025;
  const rate=+document.getElementById('inf_rate').value/100||0.03;
  const years=toY-fromY;
  const adjusted=amount*Math.pow(1+rate,years);
  const loss=adjusted-amount;
  const power=((amount/adjusted)*100).toFixed(1);
  const f=v=>'$'+v.toFixed(2);
  document.getElementById('inf_res').innerHTML=`
    <div class='result'>
      <div class='big'>${f(adjusted)}</div>
      <div class='lbl'>${f(amount)} in ${fromY} = ${f(adjusted)} in ${toY}</div>
      <div class='g2'>
        <div class='stat'><div class='v' style='color:#f87171'>${f(loss)}</div><div class='l'>Purchasing Power Lost</div></div>
        <div class='stat'><div class='v' style='color:#fbbf24'>${power}%</div><div class='l'>Purchasing Power Remaining</div></div>
        <div class='stat'><div class='v'>${years}</div><div class='l'>Years</div></div>
        <div class='stat'><div class='v' style='color:#7c8cff'>${(rate*100).toFixed(1)}%</div><div class='l'>Annual Inflation Rate</div></div>
      </div>
    </div>`;}
</script></div></div>
