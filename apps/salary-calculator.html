<html lang="en">
<head>
<meta name="google-site-verification" content="dZovMOV47epEcL1P2-9uaZXL0yvAXAigKJLHVB3sEJY">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Net Salary Calculator Europe</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5382997898313669" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f2027;color:#e0e0e0;min-height:100vh}
  .header{background:linear-gradient(135deg,#203a43,#2c5364);padding:24px;text-align:center;color:#fff}
  .header h1{font-size:1.8rem} .header p{opacity:.8;font-size:.95rem;margin-top:4px}
  .ad{background:#1a2a35;border:1px dashed #2c5364;border-radius:8px;padding:16px;margin:16px auto;max-width:900px;text-align:center;color:#667}
  .app{max-width:780px;margin:24px auto;background:#1a2a35;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
  label{display:block;margin-bottom:6px;color:#8899aa;font-size:.9rem}
  input,select{width:100%;padding:12px;background:#0f2027;border:1px solid #2c5364;border-radius:8px;color:#fff;font-size:1rem;margin-bottom:16px}
  button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:.2s}
  button:hover{opacity:.9} .result{background:#0f2027;border-radius:12px;padding:24px;margin-top:20px;text-align:center}
  .result .val{font-size:2.2rem;font-weight:700;color:#667eea} .result .lbl{color:#8899aa;font-size:.9rem}
  table{width:100%;border-collapse:collapse;margin-top:16px;font-size:.85rem}
  th{background:#203a43;color:#fff;padding:8px} td{padding:8px;border-bottom:1px solid #1a2a35;text-align:right}
  tr:hover td{background:#203a43} footer{text-align:center;padding:20px;color:#445;font-size:.8rem}
</style>
</head>
<body>
<div class="header"><h1>Net Salary Calculator Europe</h1><p>Free professional calculator — Updated 2025</p></div>
<div class="ad">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5382997898313669" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<div class="app">
  <h2 style="margin-bottom:20px;color:#667eea">Net Salary Calculator — Europe</h2>
  <label>Gross Income</label><input id="gross" type="number" value="50000">
  <label>Frequency</label>
  <select id="freq">
    <option value="annual">Annual</option>
    <option value="monthly">Monthly</option>
    <option value="hourly">Hourly</option>
  </select>
  <label>Country</label>
  <select id="sc">
    <option value="FR">🇫🇷 France</option>
    <option value="DE">🇩🇪 Germany</option>
    <option value="UK">🇬🇧 United Kingdom</option>
    <option value="ES">🇪🇸 Spain</option>
    <option value="IT">🇮🇹 Italy</option>
    <option value="NL">🇳🇱 Netherlands</option>
    <option value="BE">🇧🇪 Belgium</option>
    <option value="PL">🇵🇱 Poland</option>
  </select>
  <button onclick="calcSalary()">Calculate Net Salary</button>
  <div id="sal-res"></div>
</div>
<script>
function calcSalary(){
  const gross=parseFloat(document.getElementById('gross').value)||0;
  const country=document.getElementById('sc').value;
  const freq=document.getElementById('freq').value;
  const configs={
    FR:{tax:0.30,social:0.22,name:'France'},
    DE:{tax:0.30,social:0.20,name:'Germany'},
    UK:{tax:0.20,social:0.12,name:'UK'},
    ES:{tax:0.24,social:0.064,name:'Spain'},
    IT:{tax:0.27,social:0.097,name:'Italy'},
    NL:{tax:0.375,social:0.177,name:'Netherlands'},
    BE:{tax:0.40,social:0.135,name:'Belgium'},
    PL:{tax:0.17,social:0.22,name:'Poland'}
  };
  const c=configs[country]||configs['FR'];
  const annual_gross=freq==='monthly'?gross*12:(freq==='hourly'?gross*1820:gross);
  const tax_amt=annual_gross*c.tax;
  const social_amt=annual_gross*c.social;
  const net_annual=annual_gross-tax_amt-social_amt;
  const f=v=>v.toLocaleString('en-US',{style:'currency',currency:'EUR',maximumFractionDigits:0});
  document.getElementById('sal-res').innerHTML=`
    <div class="result">
      <div class="val">${f(net_annual/12)}/mo net</div><div class="lbl">Net Monthly in ${c.name}</div>
      <div style="display:flex;gap:16px;margin-top:16px;justify-content:center;flex-wrap:wrap">
        <div><div style="font-size:1.1rem;color:#4ecdc4">${f(net_annual)}</div><div class="lbl">Net Annual</div></div>
        <div><div style="font-size:1.1rem;color:#ff6b6b">${f(tax_amt)}</div><div class="lbl">Income Tax (${(c.tax*100).toFixed(0)}%)</div></div>
        <div><div style="font-size:1.1rem;color:#ffd93d">${f(social_amt)}</div><div class="lbl">Social Security (${(c.social*100).toFixed(0)}%)</div></div>
      </div>
    </div>`;
}
</script>

</div>
