<div class="app"><div class="card"><h2>💎 Net Worth Calculator</h2><p style='color:#8892b0;margin-bottom:16px'>Add all your assets and liabilities to calculate your net worth</p><h3 style='color:#4ade80;margin-bottom:10px'>📈 Assets</h3><div id='asset_rows'><div style='display:flex;gap:8px;margin-bottom:8px'><input type='text' placeholder='Checking/Savings' value='Savings Account' style='flex:2;padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><input type='number' value='25000' style='flex:1;padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><button onclick='this.parentElement.remove()' style='width:40px;padding:10px;background:#f87171;border-radius:8px;border:none;color:#fff;cursor:pointer'>×</button></div><div style='display:flex;gap:8px;margin-bottom:8px'><input type='text' value='Investment Portfolio' style='flex:2;padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><input type='number' value='85000' style='flex:1;padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><button onclick='this.parentElement.remove()' style='width:40px;padding:10px;background:#f87171;border-radius:8px;border:none;color:#fff;cursor:pointer'>×</button></div></div><button onclick='addRow("asset")' style='background:#1a1f3a;border:1px dashed #4ade80;color:#4ade80;margin-bottom:16px'>+ Add Asset</button><h3 style='color:#f87171;margin-bottom:10px'>📉 Liabilities</h3><div id='liab_rows'><div style='display:flex;gap:8px;margin-bottom:8px'><input type='text' value='Mortgage Balance' style='flex:2;padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><input type='number' value='220000' style='flex:1;padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><button onclick='this.parentElement.remove()' style='width:40px;padding:10px;background:#f87171;border-radius:8px;border:none;color:#fff;cursor:pointer'>×</button></div></div><button onclick='addRow("liab")' style='background:#1a1f3a;border:1px dashed #f87171;color:#f87171;margin-bottom:16px'>+ Add Liability</button><button onclick='calcNetWorth()'>💎 Calculate Net Worth</button><div id='nw_res'></div><script>const assets=[];
const liabilities=[];
function addRow(type){
  const wrap=document.getElementById(type+'_rows');
  const d=document.createElement('div');
  d.style.cssText='display:flex;gap:8px;margin-bottom:8px';
  d.innerHTML=`<input type=text placeholder='Name (e.g. House)' style='flex:2;padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><input type=number placeholder='Value $' style='flex:1;padding:10px;background:#0a0e1a;border:1px solid #3d4580;border-radius:8px;color:#e0e6ff'><button onclick='this.parentElement.remove()' style='width:40px;padding:10px;background:#f87171;border-radius:8px;border:none;color:#fff;cursor:pointer'>×</button>`;
  wrap.appendChild(d);
}
function calcNetWorth(){
  let ta=0,tl=0;
  document.querySelectorAll('#asset_rows div').forEach(row=>{
    const v=parseFloat(row.querySelectorAll('input')[1].value)||0;
    ta+=v;
  });
  document.querySelectorAll('#liab_rows div').forEach(row=>{
    const v=parseFloat(row.querySelectorAll('input')[1].value)||0;
    tl+=v;
  });
  const nw=ta-tl;
  const f=v=>'$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  document.getElementById('nw_res').innerHTML=`
    <div class='result'>
      <div class='big' style='color:${nw>=0?'#4ade80':'#f87171'}'>${f(nw)}</div>
      <div class='lbl'>Net Worth</div>
      <div class='g2'>
        <div class='stat'><div class='v' style='color:#4ade80'>${f(ta)}</div><div class='l'>Total Assets</div></div>
        <div class='stat'><div class='v' style='color:#f87171'>${f(tl)}</div><div class='l'>Total Liabilities</div></div>
        <div class='stat'><div class='v'>${ta>0?((nw/ta)*100).toFixed(1):0}%</div><div class='l'>Asset Coverage</div></div>
        <div class='stat'><div class='v' style='color:${nw>=0?'#4ade80':'#f87171'}'>${nw>=0?'Positive':'Negative'}</div><div class='l'>Status</div></div>
      </div>
    </div>`;}
