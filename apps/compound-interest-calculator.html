<div class="app"><div class="card"><h2 style='color:#7c8cff;margin-bottom:20px'>📈 Compound Interest Calculator</h2><label>Principal ($)</label><input id='ci_p' type='number' value='10000'><label>Annual Rate (%)</label><input id='ci_r' type='number' value='8' step='0.1'><label>Time (years)</label><input id='ci_t' type='number' value='20'><label>Compound Frequency</label><select id='ci_n'><option value='365'>Daily</option><option value='12' selected>Monthly</option><option value='4'>Quarterly</option><option value='1'>Annually</option></select><label>Monthly Contribution ($)</label><input id='ci_m' type='number' value='200'><button onclick='calcCI()'>Calculate</button><div id='ci_res'></div><script>function fmtD(v){return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function calcCI(){
  const P=+document.getElementById('ci_p').value||0;
  const r=+document.getElementById('ci_r').value/100;
  const t=+document.getElementById('ci_t').value||1;
  const n=+document.getElementById('ci_n').value;
  const m=+document.getElementById('ci_m').value||0;
  const A=P*Math.pow(1+r/n,n*t);
  const fM=m*(Math.pow(1+r/n,n*t)-1)/(r/n);
  const tot=A+fM; const inv=P+m*12*t; const gain=tot-inv;
  let rows='';
  for(let y=1;y<=Math.min(t,10);y++){
    const a=P*Math.pow(1+r/n,n*y)+m*(Math.pow(1+r/n,n*y)-1)/(r/n);
    rows+=`<tr><td>Year ${y}</td><td>${fmtD(a)}</td><td>${fmtD(a-(P+m*12*y))}</td></tr>`;
  }
  document.getElementById('ci_res').innerHTML=`
    <div class='result'><div class='big'>${fmtD(tot)}</div>
    <div class='lbl'>Final value after ${t} years</div>
    <div class='g2'>
      <div class='stat'><div class='v' style='color:#4ade80'>${fmtD(gain)}</div><div class='l'>Total Gain</div></div>
      <div class='stat'><div class='v' style='color:#f87171'>${fmtD(inv)}</div><div class='l'>Total Invested</div></div>
      <div class='stat'><div class='v' style='color:#7c8cff'>${((gain/inv)*100).toFixed(1)}%</div><div class='l'>ROI</div></div>
      <div class='stat'><div class='v' style='color:#a855f7'>${fmtD(tot/12/t)}</div><div class='l'>Monthly equiv.</div></div>
    </div></div>
    <table style='margin-top:16px'><tr><th>Year</th><th>Portfolio</th><th>Gain</th></tr>${rows}</table>`;}
</script></div></div>
