<div class="app"><div class="card"><h2>🔥 FIRE Calculator — Financial Independence</h2><p style='color:#8892b0;margin-bottom:16px'>Calculate when you can retire early using the FIRE method</p><label>Annual Spending in Retirement ($)</label><input id='fire_spend' type='number' value='40000'><label>Current Portfolio Value ($)</label><input id='fire_saved' type='number' value='50000'><label>Expected Annual Return (%)</label><input id='fire_rate' type='number' value='7' step='0.5'><label>Monthly Contribution ($)</label><input id='fire_contrib' type='number' value='2000'><label>Withdrawal Rate</label><select id='fire_wr'><option value='3'>3% (Very Conservative)</option><option value='3.5'>3.5% (Conservative)</option><option value='4' selected>4% (Standard FIRE Rule)</option><option value='4.5'>4.5% (Moderate)</option><option value='5'>5% (Aggressive)</option></select><button onclick='calcFIRE()'>🔥 Calculate FIRE Date</button><div id='fire_res'></div><script>function calcFIRE(){
  const spend=+document.getElementById('fire_spend').value||0;
  const saved=+document.getElementById('fire_saved').value||0;
  const rate=+document.getElementById('fire_rate').value/100||0.07;
  const contrib=+document.getElementById('fire_contrib').value||0;
  const wr=+document.getElementById('fire_wr').value/100||0.04;
  const target=spend/wr;
  const need=target-saved;
  let years=0,portfolio=saved;
  while(portfolio<target && years<100){
    portfolio=portfolio*(1+rate)+contrib*12;
    years++;
  }
  const f=v=>'$'+v.toLocaleString('en-US',{maximumFractionDigits:0});
  const yr=new Date().getFullYear();
  document.getElementById('fire_res').innerHTML=`
    <div class='result'>
      <div class='big' style='color:#fbbf24'>${years} years</div>
      <div class='lbl'>Until Financial Independence (${yr+years})</div>
      <div class='g2'>
        <div class='stat'><div class='v' style='color:#7c8cff'>${f(target)}</div><div class='l'>FIRE Target (${(wr*100).toFixed(0)}% rule)</div></div>
        <div class='stat'><div class='v' style='color:#4ade80'>${f(portfolio)}</div><div class='l'>Portfolio at FIRE</div></div>
        <div class='stat'><div class='v' style='color:#a855f7'>${f(spend)}</div><div class='l'>Annual Spend</div></div>
        <div class='stat'><div class='v' style='color:#60a5fa'>${f(contrib*12)}</div><div class='l'>Annual Contribution</div></div>
      </div>
    </div>`;}
